<!DOCTYPE html>
<html>
<head>
    <title>Scan with Expo Go</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: white;
        }
        h1 { margin-bottom: 20px; }
        #qrcode { 
            background: white; 
            padding: 20px; 
            border-radius: 10px;
            margin: 20px;
        }
        p { color: #aaa; max-width: 400px; text-align: center; }
    </style>
</head>
<body>
    <h1>Justblr Matrix - Scan with Expo Go</h1>
    <div id="qrcode"></div>
    <p>Open Expo Go app on your phone and scan this QR code</p>
    <script>
        QRCode.toCanvas(document.getElementById('qrcode'), 'exp://voice-first-hub.ngrok.io', {
            width: 300,
            margin: 2
        });
    </script>
</body>
</html>
